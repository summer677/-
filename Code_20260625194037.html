<!DOCTYPE html>
<html lang="zh-CN">
<head>

<script src="supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;overflow-x:hidden}:root{--p:#e74c3c;--pd:#c0392b;--g:#2ecc71;--o:#e67e22;--c:#1a1a2e;--c2:#16213e;--t:#eee;--t2:#aaa;--b:#333}.lg,.rg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0f1a,#1a1a2e,#16213e);padding:20px}.rg{display:none}.ab{background:var(--c);border-radius:20px;padding:30px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5)}.ab h1{text-align:center;font-size:28px;margin-bottom:6px;color:var(--p)}.ab p.s{text-align:center;color:var(--t2);font-size:13px;margin-bottom:24px}.ig{margin-bottom:14px}.ig label{display:block;font-size:13px;color:var(--t2);margin-bottom:6px}.ig input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--b);background:#0f0f1a;color:#fff;font-size:15px;outline:0;transition:border .3s}.ig input:focus{border-color:var(--p)}.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s}.bp{background:var(--p);color:#fff}.bp:active{background:var(--pd);transform:scale(.98)}.em{color:var(--p);font-size:13px;margin-top:10px;text-align:center;min-height:20px}.sm{color:var(--g);font-size:13px;margin-top:10px;text-align:center;min-height:20px}.ta{text-align:center;margin-top:16px;font-size:13px;color:var(--t2)}.ta a{color:var(--p);text-decoration:none;cursor:pointer;font-weight:600}.ap{display:none;min-height:100vh;background:#0f0f1a}.tb{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--c);border-bottom:1px solid var(--b)}.tb .t{font-size:18px;font-weight:700;color:var(--p)}.tb .r{display:flex;align-items:center;gap:12px}.tb .sb{font-size:12px;color:var(--t2);background:var(--c2);padding:4px 10px;border-radius:20px}.tb .av{width:32px;height:32px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}tb{display:flex;background:var(--c);border-bottom:1px solid var(--b)}tb .t{flex:1;text-align:center;padding:12px 0;font-size:14px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .3s}tb .t.a{color:var(--p);border-bottom-color:var(--p)}.co{padding:16px;padding-bottom:80px}.pg{display:none}.pg.a{display:block}.tc{background:var(--c);border-radius:20px;padding:30px 20px;text-align:center;margin-bottom:16px}.tmr{display:flex;justify-content:center;gap:8px;margin-bottom:20px}.tmr button{padding:6px 16px;border-radius:20px;border:1px solid var(--b);background:transparent;color:var(--t2);font-size:13px;cursor:pointer;transition:all .3s}.tmr button.a{background:var(--p);color:#fff;border-color:var(--p)}.td{font-size:72px;font-weight:200;color:#fff;margin:10px 0;font-variant-numeric:tabular-nums}.tl{font-size:14px;color:var(--t2);margin-bottom:20px}.tbr{display:flex;justify-content:center;gap:14px}.tbt{width:56px;height:56px;border-radius:50%;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}.tbt.p{background:var(--p);color:#fff}.tbt.p:active{background:var(--pd)}.tbt.s{background:var(--c2);color:var(--t2);border:1px solid var(--b)}.ps{background:var(--c);border-radius:14px;padding:16px;margin-bottom:16px}.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.ph span{font-size:13px;color:var(--t2)}.pb{width:100%;height:8px;background:var(--c2);border-radius:4px;overflow:hidden}.pbf{height:100%;background:linear-gradient(90deg,var(--p),var(--o));border-radius:4px;transition:width .5s;width:0%}tir{display:flex;gap:8px;margin-bottom:14px}tir input{flex:1;padding:11px 14px;border-radius:10px;border:1px solid var(--b);background:var(--c);color:#fff;font-size:14px;outline:0}tir input:focus{border-color:var(--p)}tir .ba{padding:11px 16px;border-radius:10px;border:none;background:var(--p);color:#fff;font-size:14px;cursor:pointer;white-space:nowrap}tir .ba:active{background:var(--pd)}.ct{display:flex;gap:6px;margin-bottom:14px}.ct button{padding:5px 12px;border-radius:16px;border:1px solid var(--b);background:transparent;color:var(--t2);font-size:12px;cursor:pointer}.ct button.a{background:var(--p);color:#fff;border-color:var(--p)}.tl2{display:flex;flex-direction:column;gap:8px}.ti{display:flex;align-items:center;background:var(--c);border-radius:12px;padding:12px 14px;gap:12px;transition:all .3s}.ti.d{opacity:.5}.ti.d .tt{text-decoration:line-through;color:var(--t2)}.tc2{width:22px;height:22px;border-radius:50%;border:2px solid var(--b);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .3s}.tc2.c{background:var(--g);border-color:var(--g)}.tc2.c::after{content:'✓';color:#fff;font-size:12px}.tif{flex:1;min-width:0}.tt{font-size:14px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tca{font-size:11px;color:var(--t2);margin-top:2px}.td2{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}.td2:active{color:var(--p)}.e{text-align:center;padding:40px 20px;color:var(--t2);font-size:14px}.e .i{font-size:40px;margin-bottom:10px}.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}.sc{background:var(--c);border-radius:14px;padding:16px;text-align:center}.sc .n{font-size:28px;font-weight:700;color:var(--p)}.sc .l{font-size:12px;color:var(--t2);margin-top:4px}.src{background:linear-gradient(135deg,var(--p),var(--o));border-radius:14px;padding:20px;margin-bottom:16px;text-align:center}.src .n{font-size:36px;font-weight:700}.src .l{font-size:13px;opacity:.9}.sc2{background:var(--c);border-radius:14px;padding:16px;margin-bottom:12px}.sc2 h3{font-size:15px;margin-bottom:12px}.sr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b)}.sr:last-child{border-bottom:none}.sr label{font-size:14px;color:var(--t)}.sr input{width:60px;padding:6px 10px;border-radius:8px;border:1px solid var(--b);background:#0f0f1a;color:#fff;font-size:14px;text-align:center;outline:0}.sr input:focus{border-color:var(--p)}.blo{width:100%;padding:13px;border:1px solid var(--p);border-radius:10px;background:transparent;color:var(--p);font-size:15px;cursor:pointer;margin-top:8px}.blo:active{background:rgba(231,76,60,.1)}.to{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,.85);color:#fff;padding:14px 28px;border-radius:12px;font-size:15px;z-index:999;opacity:0;transition:all .3s;pointer-events:none}.to.s{opacity:1;transform:translate(-50%,-50%) scale(1)}
</style>
</head>
<body>

<div class="lg" id="lp">
  <div class="ab">
    <h1>🍅 番茄时钟</h1>
    <p class="s">专注每一刻，收获每一天</p>
    <div class="ig"><label>邮箱地址</label><input type="email" id="ei" placeholder="请输入邮箱"></div>
    <div class="ig"><label>密码</label><input type="password" id="pi" placeholder="请输入密码"></div>
    <button class="btn bp" onclick="hL()">登 录</button>
    <div class="ta">还没有账号？<a onclick="sR()">立即注册</a></div>
    <div class="em" id="em"></div>
    <div class="sm" id="sm"></div>
  </div>
</div>

<div class="rg" id="rp">
  <div class="ab">
    <h1>🍅 注册账号</h1>
    <p class="s">创建你的番茄时钟账号</p>
    <div class="ig"><label>邮箱地址</label><input type="email" id="re" placeholder="请输入邮箱"></div>
    <div class="ig"><label>密码（至少6位）</label><input type="password" id="rpw" placeholder="请输入密码"></div>
    <div class="ig"><label>确认密码</label><input type="password" id="rc" placeholder="再次输入密码"></div>
    <button class="btn bp" onclick="hR()">注 册</button>
    <div class="ta">已有账号？<a onclick="sL()">返回登录</a></div>
    <div class="em" id="rem"></div>
    <div class="sm" id="rsm"></div>
  </div>
</div>

<div class="ap" id="ap">
  <div class="tb">
    <div class="t">🍅 番茄时钟</div>
    <div class="r">
      <span class="sb" id="tp">🍅 0</span>
      <div class="av" id="ab" onclick="sT('settings',document.querySelector('.t[data-tab=settings]'))">🍅</div>
    </div>
  </div>
  <div class="tb">
    <div class="t a" data-tab="timer" onclick="sT('timer',this)">🍅 专注</div>
    <div class="t" data-tab="tasks" onclick="sT('tasks',this)">✅ 任务</div>
    <div class="t" data-tab="stats" onclick="sT('stats',this)">📊 统计</div>
    <div class="t" data-tab="settings" onclick="sT('settings',this)">⚙️ 设置</div>
  </div>
  <div class="co">
    <div class="pg a" id="pg-timer">
      <div class="tc">
        <div class="tmr">
          <button class="a" id="mf" onclick="sM('focus',this)">专注</button>
          <button id="ms" onclick="sM('short',this)">短休</button>
          <button id="ml" onclick="sM('long',this)">长休</button>
        </div>
        <div class="td" id="td">25:00</div>
        <div class="tl" id="tl">准备开始专注吧！</div>
        <div class="tbr">
          <button class="tbt p" id="pb" onclick="tT()">▶</button>
          <button class="tbt s" id="sb" onclick="rT()" style="display:none">■</button>
        </div>
      </div>
      <div class="ps">
        <div class="ph"><span>今日任务进度</span><span id="pt">0/0</span></div>
        <div class="pb"><div class="pbf" id="pf"></div></div>
      </div>
    </div>
    <div class="pg" id="pg-tasks">
      <div class="tir"><input type="text" id="ti" placeholder="添加新任务..." onkeydown="if(event.key==='Enter')aT()"><button class="ba" onclick="aT()">＋</button></div>
      <div class="ct" id="cts"><button class="a" data-cat="all" onclick="fC('all',this)">全部</button><button data-cat="study" onclick="fC('study',this)">📚 学习</button><button data-cat="work" onclick="fC('work',this)">💼 工作</button><button data-cat="life" onclick="fC('life',this)">🌿 生活</button></div>
      <div class="tl2" id="tl2"></div>
    </div>
    <div class="pg" id="pg-stats">
      <div class="src"><div class="n" id="sn">0</div><div class="l">🔥 连续专注天数</div></div>
      <div class="sg">
        <div class="sc"><div class="n" id="st">0</div><div class="l">任务总数</div></div>
        <div class="sc"><div class="n" id="sd">0</div><div class="l">已完成</div></div>
        <div class="sc"><div class="n" id="sp">0</div><div class="l">🍅 专注次数</div></div>
        <div class="sc"><div class="n" id="sm2">0</div><div class="l">⏱ 累计分钟</div></div>
      </div>
    </div>
    <div class="pg" id="pg-settings">
      <div class="sc2">
        <h3>⏱ 番茄钟时长</h3>
        <div class="sr"><label>专注时长（分钟）</label><input type="number" id="sf" value="25" min="1" max="60" onchange="sS()"></div>
        <div class="sr"><label>短休时长（分钟）</label><input type="number" id="ss" value="5" min="1" max="30" onchange="sS()"></div>
        <div class="sr"><label>长休时长（分钟）</label><input type="number" id="sl" value="15" min="1" max="60" onchange="sS()"></div>
      </div>
      <div class="sc2">
        <h3>👤 账户</h3>
        <div class="sr"><label>当前用户</label><span style="font-size:13px;color:var(--t2)" id="cu">-</span></div>
      </div>
      <button class="blo" onclick="lo()">退出登录</button>
    </div>
  </div>
</div>

<div class="to" id="to"></div>

<script>
const SU='https://uqobordhbhwxltresvhu.supabase.co';
const SA='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxb2JvcmRoYmh3eGx0cmVzdmh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTYxMjksImV4cCI6MjA5Nzg3MjEyOX0.hApCCb7f4qzzkwBfn0obFF_qTkkKGnz4FmDskzPBsAw';
const sb=window.supabase.createClient(SU,SA);
let ts=[],cc='all',ti=null,tr=false,tv=1500,cm='focus',st={focus:25,short:5,long:15},ss={pomodoro_count:0,total_minutes:0,streak_days:0};

// ===== 核心修复：强制跳转逻辑 =====
function forceShowApp(user) {
  if (!user) return;
  console.log("强制进入主界面:", user.email);
  document.getElementById('lp').style.display='none';
  document.getElementById('rp').style.display='none';
  document.getElementById('ap').style.display='block';
  document.getElementById('cu').textContent = user.email;
  document.getElementById('ab').textContent = (user.email || '🍅').charAt(0).toUpperCase();
  rT(); lS(); lD(); lD2(); rSs();
}

// ===== 页面切换 =====
function sL(){document.getElementById('lp').style.display='flex';document.getElementById('rp').style.display='none';document.getElementById('ap').style.display='none'}
function sR(){document.getElementById('lp').style.display='none';document.getElementById('rp').style.display='flex';document.getElementById('ap').style.display='none'}

// ===== 登录（修复版）=====
async function hL(){
  const e=document.getElementById('ei').value.trim(),p=document.getElementById('pi').value;
  if(!e||!p){shE('请输入邮箱和密码');return}
  shE('');
  const { data, error } = await sb.auth.signInWithPassword({email:e,password:p});
  if(error){shE('登录失败：'+error.message);return}
  
  // 关键修复：直接读取返回的 session
  if (data.session && data.user) {
    shS('登录成功！正在跳转...');
    // 立即执行跳转
    forceShowApp(data.user);
  } else {
    // 兜底：如果没拿到 user，再试一次 getSession
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      forceShowApp(session.user);
    } else {
      shE('登录异常，请重试');
    }
  }
}

// ===== 注册（修复版）=====
async function hR(){
  const e=document.getElementById('re').value.trim(),p=document.getElementById('rpw').value,c=document.getElementById('rc').value;
  if(!e||!p){shRE('请输入邮箱和密码');return}
  if(p.length<6){shRE('密码至少需要6位');return}
  if(p!==c){shRE('两次密码不一致');return}
  shRE('');shRS('');
  const { data: signUpData, error: signUpError } = await sb.auth.signUp({email:e,password:p});
  if(signUpError){shRE('注册失败：'+signUpError.message);return}
  
  // 注册成功后自动登录
  const { data: signInData, error: signInError } = await sb.auth.signInWithPassword({email:e,password:p});
  if(signInError){shRE('自动登录失败：'+signInError.message);return}
  
  if (signInData.session && signInData.user) {
    shRS('注册成功！正在跳转...');
    forceShowApp(signInData.user);
  } else {
    shRE('注册成功但无法登录，请手动登录');
  }
}

function shE(m){document.getElementById('em').textContent=m;document.getElementById('sm').textContent=''}
function shS(m){document.getElementById('sm').textContent=m;document.getElementById('em').textContent=''}
function shRE(m){document.getElementById('rem').textContent=m;document.getElementById('rsm').textContent=''}
function shRS(m){document.getElementById('rsm').textContent=m;document.getElementById('rem').textContent=''}
function lo(){sb.auth.signOut(); ts=[]; sL(); }

// ===== 其余功能函数（保持不变）=====
function sT(p,e){document.querySelectorAll('.t').forEach(t=>t.classList.remove('a'));if(e)e.classList.add('a');document.querySelectorAll('.pg').forEach(p=>p.classList.remove('a'));const g=document.getElementById('pg-'+p);if(g)g.classList.add('a');if(p==='stats')rSs();if(p==='tasks')rTl()}
function sM(m,e){document.querySelectorAll('.tmr button').forEach(b=>b.classList.remove('a'));e.classList.add('a');cm=m;rT()}
function rT(){clearInterval(ti);tr=false;document.getElementById('pb').textContent='▶';document.getElementById('sb').style.display='none';tv=(st[cm]||25)*60;uTD();const l={focus:'准备开始专注吧！',short:'休息一下，放松眼睛 🌿',long:'好好休息，充充电 🔋'};document.getElementById('tl').textContent=l[cm]||''}
function tT(){if(tr){clearInterval(ti);tr=false;document.getElementById('pb').textContent='▶';document.getElementById('sb').style.display='none'}else{tr=true;document.getElementById('pb').textContent='⏸';document.getElementById('sb').style.display='flex';ti=setInterval(()=>{tv--;uTD();if(tv<=0)tC()},1000)}}
function uTD(){const m=Math.floor(tv/60),s=tv%60;document.getElementById('td').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function tC(){clearInterval(ti);tr=false;document.getElementById('pb').textContent='▶';document.getElementById('sb').style.display='none';if(navigator.vibrate)navigator.vibrate([200,100,200]);const l={focus:'🍅 专注完成！休息一下吧',short:'⏰ 休息结束，继续加油！',long:'⏰ 长休结束，满血复活！'};shT(l[cm]||'完成！');if(cm==='focus'){ss.pomodoro_count++;ss.total_minutes+=(st.focus||25);sVs()}rT()}
function shT(m){const t=document.getElementById('to');if(!t)return;t.textContent=m;t.classList.add('s');setTimeout(()=>t.classList.remove('s'),2500)}
async function lD2(){const{data:t}=await sb.from('tasks').select('*').order('created_at',{ascending:false});ts=t||[];rTl();uTP();lSs()}
function fC(c,e){cc=c;document.querySelectorAll('.ct button').forEach(b=>b.classList.remove('a'));e.classList.add('a');rTl()}
function rTl(){const l=document.getElementById('tl2');if(!l)return;let f=ts;if(cc!=='all')f=ts.filter(t=>t.category===cc);if(f.length===0){l.innerHTML='<div class="e"><div class="i">📝</div>暂无任务，添加一个吧！</div>';return}l.innerHTML=f.map(t=>{const e={study:'📚',work:'💼',life:'🌿'},n={study:'学习',work:'工作',life:'生活'};return `<div class="ti ${t.done?'d':''}" data-id="${t.id}"><div class="tc2 ${t.done?'c':''}" onclick="tT2('${t.id}')"></div><div class="tif"><div class="tt">${eH(t.title)}</div><div class="tca">${e[t.category]||''} ${n[t.category]||''}</div></div><button class="td2" onclick="dT('${t.id}')">✕</button></div>`}).join('');uTP()}
function eH(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
async function aT(){const i=document.getElementById('ti'),t=i.value.trim();if(!t)return;const c=cc==='all'?'study':cc;const{data,e}=await sb.from('tasks').insert({title:t,category:c,done:false}).select();if(!e&&data){ts.unshift(data[0]);i.value='';rTl()}}
async function tT2(id){const t=ts.find(t=>t.id===id);if(!t)return;const nd=!t.done;await sb.from('tasks').update({done:nd}).eq('id',id);t.done=nd;rTl();if(nd)shT('✅ 任务完成！')}
async function dT(id){await sb.from('tasks').delete().eq('id',id);ts=ts.filter(t=>t.id!==id);rTl()}
function uTP(){const o=ts.length,d=ts.filter(t=>t.done).length;const p=document.getElementById('pt');if(p)p.textContent=d+'/'+o;const f=o?Math.round(d/o*100):0,g=document.getElementById('pf');if(g)g.style.width=f+'%';const h=document.getElementById('tp');if(h)h.textContent='🍅 '+ss.pomodoro_count}
async function lSs(){const{data:{user}}=await sb.auth.getUser();if(!user)return;const{data}=await sb.from('user_stats').select('*').eq('user_id',user.id).single();if(data)ss={...ss,...data};rSs()}
async function sVs(){const{data:{user}}=await sb.auth.getUser();if(!user)return;await sb.from('user_stats').upsert({user_id:user.id,...ss,updated_at:new Date()})}
function rSs(){const e=id=>document.getElementById(id);if(e('st'))e('st').textContent=ts.length;if(e('sd'))e('sd').textContent=ts.filter(t=>t.done).length;if(e('sp'))e('sp').textContent=ss.pomodoro_count;if(e('sm2'))e('sm2').textContent=ss.total_minutes;if(e('sn'))e('sn').textContent=ss.streak_days}
